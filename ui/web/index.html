<!DOCTYPE html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='40' fill='%236366f1'/%3E%3Ctext x='50' y='65' font-family='system-ui' font-size='50' fill='white' text-anchor='middle'%3EN%3C/text%3E%3C/svg%3E" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>Nightingale</title>
    <!--
      Dark-mode init runs from main.tsx after bundle load. We do NOT
      inline a pre-paint script here because the CSP scriptSrc directive
      (set by helmet in the Express server) is locked to 'self' with no
      'unsafe-inline' and no nonce — a CDN of `'unsafe-inline'` would
      defeat the protection.
      Trade-off: brief flash of light theme on first paint before React
      mounts. Worth it.
    -->
  </head>
  <body class="h-full bg-gray-50 text-gray-900 dark:bg-gray-950 dark:text-gray-100">
    <div id="root" class="h-full"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
